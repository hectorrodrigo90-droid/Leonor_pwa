<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leonor</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0f172a;
  color: white;
  display: flex;
  height: 100vh;
}

aside {
  width: 260px;
  background: #020617;
  padding: 15px;
  border-right: 1px solid #1e293b;
}

main {
  flex: 1;
  padding: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
  background: #1e293b;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
  background: #22c55e;
  font-weight: bold;
  cursor: pointer;
}

.project, .task {
  background: #1e293b;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
}

.delete {
  background: #ef4444;
  color: white;
}

#agent {
  margin-top: 10px;
  padding: 10px;
  background: #020617;
  border-radius: 8px;
}
</style>
</head>

<body>

<aside>
  <h3>Proyectos</h3>
  <input id="newProject" placeholder="Nuevo proyecto"/>
  <button onclick="createProject()">Crear</button>
  <div id="projects"></div>
</aside>

<main>
  <h2 id="title">Selecciona proyecto</h2>

  <div id="agent"></div>

  <input id="taskInput" placeholder="Nueva tarea"/>
  <button onclick="addTask()">Agregar</button>

  <div id="tasks"></div>
</main>

<script>
// ================= DB =================
const DB_NAME = "leonor_db";
const STORE = "projects";
let db;

let state = {
  current: null,
  projects: {}
};

function initDB() {
  return new Promise(res => {
    const req = indexedDB.open(DB_NAME, 1);

    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(STORE, { keyPath: "name" });
    };

    req.onsuccess = e => {
      db = e.target.result;
      res();
    };
  });
}

function save(project) {
  const tx = db.transaction(STORE, "readwrite");
  tx.objectStore(STORE).put(project);
}

function load() {
  return new Promise(res => {
    const tx = db.transaction(STORE, "readonly");
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => res(req.result);
  });
}

// ================= AGENTE =================
function agent(project) {
  const total = project.tasks.length;
  const done = project.tasks.filter(t => t.done).length;

  if (total === 0) return "Define tareas claras";

  const progress = done / total;

  if (progress === 1) return "CERRAR PROYECTO";
  if (progress > 0.7) return "NO AGREGUES MÁS. TERMINA.";
  if (progress < 0.3 && total > 5) return "SOBRECARGA. REDUCE.";
  
  return "AVANCE NORMAL";
}

// ================= APP =================
async function init() {
  await initDB();
  const data = await load();
  data.forEach(p => state.projects[p.name] = p);
  render();
}

async function createProject() {
  const name = document.getElementById("newProject").value;
  if (!name) return;

  const p = { name, tasks: [] };
  state.projects[name] = p;
  state.current = name;

  save(p);
  render();
}

function selectProject(name) {
  state.current = name;
  render();
}

function deleteProject(name) {
  delete state.projects[name];
  state.current = null;

  const tx = db.transaction(STORE, "readwrite");
  tx.objectStore(STORE).delete(name);

  render();
}

function addTask() {
  const text = document.getElementById("taskInput").value;
  if (!text || !state.current) return;

  const p = state.projects[state.current];
  const decision = agent(p);

  if (decision.includes("NO AGREGUES")) {
    alert("Leonor: termina primero lo que ya empezaste.");
    return;
  }

  p.tasks.push({ text, done: false });
  save(p);
  render();
}

function toggleTask(i) {
  const p = state.projects[state.current];
  p.tasks[i].done = !p.tasks[i].done;
  save(p);
  render();
}

function deleteTask(i) {
  const p = state.projects[state.current];
  p.tasks.splice(i, 1);
  save(p);
  render();
}

// ================= UI =================
function render() {
  const pList = document.getElementById("projects");
  pList.innerHTML = "";

  Object.keys(state.projects).forEach(name => {
    const div = document.createElement("div");
    div.className = "project";

    div.innerHTML = `
      <span onclick="selectProject('${name}')">${name}</span>
      <button class="delete" onclick="deleteProject('${name}')">X</button>
    `;

    pList.appendChild(div);
  });

  document.getElementById("title").innerText =
    state.current || "Selecciona proyecto";

  const tasks = document.getElementById("tasks");
  tasks.innerHTML = "";

  if (!state.current) return;

  const p = state.projects[state.current];

  // agente
  document.getElementById("agent").innerText = "Leonor: " + agent(p);

  p.tasks.forEach((t, i) => {
    const div = document.createElement("div");
    div.className = "task";

    div.innerHTML = `
      <span>
        <input type="checkbox" ${t.done ? "checked" : ""} onclick="toggleTask(${i})"/>
        ${t.text}
      </span>
      <button class="delete" onclick="deleteTask(${i})">X</button>
    `;

    tasks.appendChild(div);
  });
}

init();
</script>

</body>
</html>
